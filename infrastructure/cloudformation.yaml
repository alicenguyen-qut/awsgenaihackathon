AWSTemplateFormatVersion: '2010-09-09'
Description: 'Personal Cooking Assistant - EC2 Deployment (Cost Optimized)'

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket name for recipes and user data storage

Resources:
  # EC2 Key Pair
  CookingAssistantKeyPair:
    Type: AWS::EC2::KeyPair
    Properties:
      KeyName: cooking-assistant-key
      KeyType: rsa
      KeyFormat: pem

  # S3 Bucket for recipes and user data
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins: ['*']
            AllowedMethods: [GET, PUT, POST, DELETE]
            AllowedHeaders: ['*']

  # Security Group
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for cooking assistant web server
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

  # IAM Role for EC2
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CookingAssistantEC2Role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CookingAssistantPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'

  # Instance Profile
  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref EC2Role

  # EC2 Instance
  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-001f2488b35ca8aad  # Ubuntu 22.04 LTS (ap-southeast-2)
      InstanceType: t3.micro
      KeyName: !Ref CookingAssistantKeyPair
      SecurityGroupIds:
        - !Ref WebSecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt-get update -y
          apt-get install -y python3 python3-pip git nginx
          
          # Clone repository
          cd /home/ubuntu
          git clone https://github.com/alicenguyen-qut/awsgenaihackathon.git
          cd awsgenaihackathon
          
          # Install Python dependencies
          pip3 install -r requirements.txt
          
          # Set environment variables
          echo "USE_AWS=true" >> /etc/environment
          echo "AWS_REGION=${AWS::Region}" >> /etc/environment
          echo "RECIPES_BUCKET=${S3BucketName}" >> /etc/environment
          echo "S3_BUCKET=${S3BucketName}" >> /etc/environment
          
          # Index recipes to S3
          export USE_AWS=true
          export AWS_REGION=${AWS::Region}
          export RECIPES_BUCKET=${S3BucketName}
          export S3_BUCKET=${S3BucketName}
          python3 scripts/index_recipes.py
          
          # Create systemd service
          cat > /etc/systemd/system/cooking-assistant.service << EOF
          [Unit]
          Description=Cooking Assistant Flask App
          After=network.target
          
          [Service]
          Type=simple
          User=ubuntu
          WorkingDirectory=/home/ubuntu/awsgenaihackathon
          Environment=USE_AWS=true
          Environment=AWS_REGION=${AWS::Region}
          Environment=RECIPES_BUCKET=${S3BucketName}
          Environment=S3_BUCKET=${S3BucketName}
          ExecStart=/usr/bin/python3 src/app.py
          Restart=always
          
          [Install]
          WantedBy=multi-user.target
          EOF
          
          # Configure nginx
          cat > /etc/nginx/sites-available/cooking-assistant << EOF
          server {
              listen 80;
              server_name _;
              
              location / {
                  proxy_pass http://127.0.0.1:5000;
                  proxy_set_header Host \$host;
                  proxy_set_header X-Real-IP \$remote_addr;
                  proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto \$scheme;
              }
          }
          EOF
          
          ln -s /etc/nginx/sites-available/cooking-assistant /etc/nginx/sites-enabled/
          rm -f /etc/nginx/sites-enabled/default
          
          # Start services
          systemctl enable cooking-assistant
          systemctl start cooking-assistant
          systemctl restart nginx

      Tags:
        - Key: Name
          Value: CookingAssistant

Outputs:
  InstanceId:
    Description: EC2 Instance ID
    Value: !Ref WebServer
    Export:
      Name: !Sub '${AWS::StackName}-InstanceId'
  
  PublicIP:
    Description: Public IP address
    Value: !GetAtt WebServer.PublicIp
    Export:
      Name: !Sub '${AWS::StackName}-PublicIP'
  
  WebsiteURL:
    Description: Website URL
    Value: !Sub 'http://${WebServer.PublicIp}'
    Export:
      Name: !Sub '${AWS::StackName}-WebsiteURL'
  
  S3Bucket:
    Description: S3 bucket for user data
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'
  
  KeyPairName:
    Description: EC2 Key Pair name
    Value: !Ref CookingAssistantKeyPair
    Export:
      Name: !Sub '${AWS::StackName}-KeyPair'
  
  SSHCommand:
    Description: SSH command to connect to instance
    Value: !Sub 'ssh -i cooking-assistant-key.pem ubuntu@${WebServer.PublicIp}'
    Export:
      Name: !Sub '${AWS::StackName}-SSHCommand'