AWSTemplateFormatVersion: '2010-09-09'
Description: 'MealBuddy - Elastic Beanstalk Deployment'

Parameters:
  S3BucketName:
    Type: String
    Description: S3 bucket name for recipes and user data storage

Resources:
  # S3 Bucket for recipes and user data
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref S3BucketName
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30

  # Elastic Beanstalk Application
  Application:
    Type: AWS::ElasticBeanstalk::Application
    Properties:
      ApplicationName: mealbuddy
      Description: MealBuddy - AI Cooking Assistant

  # Elastic Beanstalk Environment
  Environment:
    Type: AWS::ElasticBeanstalk::Environment
    Properties:
      ApplicationName: !Ref Application
      EnvironmentName: mealbuddy-env
      SolutionStackName: "64bit Amazon Linux 2023 v4.9.3 running Python 3.11"
      OptionSettings:
        - Namespace: aws:elasticbeanstalk:environment
          OptionName: EnvironmentType
          Value: SingleInstance
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: InstanceType
          Value: t3.micro
        - Namespace: aws:autoscaling:launchconfiguration
          OptionName: IamInstanceProfile
          Value: !Ref InstanceProfile
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: USE_AWS
          Value: "true"
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: AWS_REGION
          Value: !Ref AWS::Region
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: S3_BUCKET
          Value: !Ref S3BucketName
        - Namespace: aws:elasticbeanstalk:application:environment
          OptionName: RECIPES_BUCKET
          Value: !Ref S3BucketName

  # IAM Role for EC2 instances
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: MealBuddyEBRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
      Policies:
        - PolicyName: MealBuddyPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataBucket.Arn
                  - !Sub '${DataBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: '*'

  # Instance Profile
  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref InstanceRole

Outputs:
  ApplicationName:
    Description: Elastic Beanstalk Application Name
    Value: !Ref Application
    Export:
      Name: !Sub '${AWS::StackName}-AppName'
  
  EnvironmentName:
    Description: Elastic Beanstalk Environment Name
    Value: !Ref Environment
    Export:
      Name: !Sub '${AWS::StackName}-EnvName'
  
  EnvironmentURL:
    Description: Application URL
    Value: !GetAtt Environment.EndpointURL
    Export:
      Name: !Sub '${AWS::StackName}-URL'
  
  S3Bucket:
    Description: S3 bucket for user data
    Value: !Ref DataBucket
    Export:
      Name: !Sub '${AWS::StackName}-DataBucket'